<!DOCTYPE html>
<html>
<head>
<title>Me On Game Tournament</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
        text-align: center;
        padding-bottom: 50px;
    }

    table {
        width: 95%;
        margin: auto;
        border-collapse: collapse;
        margin-bottom: 30px;
        background: #222;
    }

    th, td {
        border: 1px solid #444;
        padding: 10px;
    }

    th {
        background: #00ffd5;
        color: black;
    }

    .fixtures-container {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .match {
        background: #222;
        margin: 5px;
        padding: 10px;
        border-radius: 5px;
        width: 90%;
        max-width: 600px;
        border-left: 4px solid #00ffd5;
    }

    input {
        width: 45px;
        margin: 0 5px;
        background: #333;
        color: white;
        border: 1px solid #444;
        padding: 5px;
        text-align: center;
    }

    button {
        padding: 5px 15px;
        background: #00ffd5;
        border: none;
        font-weight: bold;
        cursor: pointer;
        border-radius: 3px;
    }

    button:hover {
        background: #00cca3;
    }

    .team-name-label {
        display: inline-block;
        width: 120px;
        font-weight: bold;
    }
</style>
</head>

<body>

<h1>Me On Game Tournament</h1>

<h2>League Table</h2>
<table>
    <thead>
        <tr>
            <th>Pos</th>
            <th>Team</th>
            <th>P</th>
            <th>W</th>
            <th>D</th>
            <th>L</th>
            <th>GF</th>
            <th>GA</th>
            <th>GD</th>
            <th>Pts</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<hr style="border: 1px solid #333; width: 90%;">

<h2>Enter Match Results (Round Robin)</h2>
<div id="fixtures" class="fixtures-container"></div>

<script>
// 1. The 10 Teams
const teamNames = [
    "Happi yoo", "Wilson", "Gun", "Panic Bruce", "Rhamim",
    "Edrine", "Elvis", "J Collins", "Cyber R", "Adamz"
];

// Initialize objects
let teams = teamNames.map(name => ({
    name: name, played: 0, won: 0, draw: 0, lost: 0, gf: 0, ga: 0, gd: 0, points: 0
}));

const fixtures = [];

// 2. Generate Round Robin (Every team plays each other once)
for (let i = 0; i < teamNames.length; i++) {
    for (let j = i + 1; j < teamNames.length; j++) {
        fixtures.push({
            team1: teamNames[i],
            team2: teamNames[j],
            score1: null,
            score2: null
        });
    }
}

// 3. Display Fixtures on Screen
function displayFixtures() {
    const div = document.getElementById("fixtures");
    div.innerHTML = "";

    fixtures.forEach((f, i) => {
        const match = document.createElement("div");
        match.className = "match";
        match.innerHTML = `
            <span class="team-name-label" style="text-align: right;">${f.team1}</span>
            <input type="number" id="s1${i}" placeholder="0" min="0">
            -
            <input type="number" id="s2${i}" placeholder="0" min="0">
            <span class="team-name-label" style="text-align: left;">${f.team2}</span>
            <button onclick="updateScore(${i})">Update Score</button>
        `;
        div.appendChild(match);
    });
}

// 4. Update individual match score
function updateScore(index) {
    const s1 = document.getElementById("s1" + index).value;
    const s2 = document.getElementById("s2" + index).value;

    if (s1 === "" || s2 === "") {
        alert("Please enter scores for both teams.");
        return;
    }

    fixtures[index].score1 = parseInt(s1);
    fixtures[index].score2 = parseInt(s2);

    calculateTable();
}

// 5. Calculate Standings
function calculateTable() {
    // Reset stats
    teams.forEach(t => {
        t.played = t.won = t.draw = t.lost = t.gf = t.ga = t.gd = t.points = 0;
    });

    // Loop through fixtures and add up scores
    fixtures.forEach(f => {
        if (f.score1 !== null && f.score2 !== null) {
            const t1 = teams.find(t => t.name === f.team1);
            const t2 = teams.find(t => t.name === f.team2);

            t1.played++; t2.played++;
            t1.gf += f.score1; t1.ga += f.score2;
            t2.gf += f.score2; t2.ga += f.score1;

            if (f.score1 > f.score2) {
                t1.won++; t2.lost++; t1.points += 3;
            } else if (f.score2 > f.score1) {
                t2.won++; t1.lost++; t2.points += 3;
            } else {
                t1.draw++; t2.draw++; t1.points += 1; t2.points += 1;
            }
        }
    });

    teams.forEach(t => t.gd = t.gf - t.ga);

    // Sort: Points > GD > GF
    teams.sort((a, b) => b.points - a.points || b.gd - a.gd || b.gf - a.gf);

    renderTable();
}

// 6. Draw Table
function renderTable() {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    teams.forEach((t, i) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${i + 1}</td>
            <td style="text-align:left;">${t.name}</td>
            <td>${t.played}</td>
            <td>${t.won}</td>
            <td>${t.draw}</td>
            <td>${t.lost}</td>
            <td>${t.gf}</td>
            <td>${t.ga}</td>
            <td>${t.gd}</td>
            <td style="color:#00ffd5; font-weight:bold;">${t.points}</td>
        `;
        tbody.appendChild(tr);
    });
}

// Start the app
displayFixtures();
calculateTable();

</script>

</body>
</html>
