<!DOCTYPE html>
<html>
<head>
<title>Me On Game Tournament</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

table{
width:90%;
margin:auto;
border-collapse:collapse;
margin-bottom:30px;
}

th,td{
border:1px solid #444;
padding:8px;
}

th{
background:#00ffd5;
color:black;
}

input{
width:40px;
margin:0 5px;
}

button{
padding:5px 10px;
background:#00ffd5;
border:none;
font-weight:bold;
cursor:pointer;
}

.match{
margin:6px;
}
</style>
</head>

<body>

<h1>Me On Game Tournament</h1>

<h2>League Table</h2>

<table>
<thead>
<tr>
<th>Pos</th>
<th>Team</th>
<th>P</th>
<th>W</th>
<th>D</th>
<th>L</th>
<th>Pts</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<h2>Fixtures</h2>

<div id="fixtures"></div>

<script>

const teams=[
{name:"Happy Yop",played:0,won:0,draw:0,lost:0,points:0},
{name:"Panic Bruce",played:0,won:0,draw:0,lost:0,points:0},
{name:"Rhamim",played:0,won:0,draw:0,lost:0,points:0},
{name:"Gun",played:0,won:0,draw:0,lost:0,points:0},
{name:"Wilson",played:0,won:0,draw:0,lost:0,points:0},
{name:"Edrine",played:0,won:0,draw:0,lost:0,points:0},
{name:"Elvis",played:0,won:0,draw:0,lost:0,points:0},
{name:"J Collins",played:0,won:0,draw:0,lost:0,points:0},
{name:"Cyber R",played:0,won:0,draw:0,lost:0,points:0},
{name:"Adamz",played:0,won:0,draw:0,lost:0,points:0}
];

const fixtures=[];

for(let i=0;i<teams.length;i++){
for(let j=i+1;j<teams.length;j++){

fixtures.push({
team1:teams[i].name,
team2:teams[j].name,
score1:null,
score2:null
});

}
}

function displayFixtures(){

const div=document.getElementById("fixtures");
div.innerHTML="";

fixtures.forEach((f,i)=>{

const match=document.createElement("div");
match.className="match";

match.innerHTML=`
${f.team1}
<input type="number" id="s1${i}" min="0">
-
<input type="number" id="s2${i}" min="0">
${f.team2}
<button onclick="submitScore(${i})">Save</button>
`;

div.appendChild(match);

});

}

function submitScore(i){

const s1=parseInt(document.getElementById("s1"+i).value);
const s2=parseInt(document.getElementById("s2"+i).value);

if(isNaN(s1)||isNaN(s2)){
alert("Enter scores");
return;
}

fixtures[i].score1=s1;
fixtures[i].score2=s2;

updateTable();

}

function updateTable(){

teams.forEach(t=>{
t.played=0;
t.won=0;
t.draw=0;
t.lost=0;
t.points=0;
});

fixtures.forEach(f=>{

if(f.score1!==null){

const t1=teams.find(t=>t.name===f.team1);
const t2=teams.find(t=>t.name===f.team2);

t1.played++;
t2.played++;

if(f.score1>f.score2){
t1.won++;
t2.lost++;
t1.points+=3;
}

else if(f.score2>f.score1){
t2.won++;
t1.lost++;
t2.points+=3;
}

else{
t1.draw++;
t2.draw++;
t1.points+=1;
t2.points+=1;
}

}

});

teams.sort((a,b)=>b.points-a.points);

const tbody=document.getElementById("tableBody");
tbody.innerHTML="";

teams.forEach((t,i)=>{

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${i+1}</td>
<td>${t.name}</td>
<td>${t.played}</td>
<td>${t.won}</td>
<td>${t.draw}</td>
<td>${t.lost}</td>
<td>${t.points}</td>
`;

tbody.appendChild(tr);

});

}

displayFixtures();
updateTable();

</script>

</body>
</html>
