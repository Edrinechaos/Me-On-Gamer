<!DOCTYPE html>
<html>
<head>
<title>10-Team Round Robin Tournament</title>
<style>
    body { font-family: 'Segoe UI', sans-serif; background: #111; color: white; text-align: center; padding: 20px; }
    table { width: 95%; margin: 20px auto; border-collapse: collapse; background: #222; box-shadow: 0 0 20px rgba(0,255,213,0.1); }
    th, td { border: 1px solid #444; padding: 12px; }
    th { background: #00ffd5; color: black; }
    .match-card { 
        background: #222; margin: 8px auto; padding: 10px; width: 90%; max-width: 500px;
        border-radius: 5px; border-left: 5px solid #00ffd5; display: flex; justify-content: space-around; align-items: center;
    }
    input { width: 45px; background: #333; border: 1px solid #00ffd5; color: white; padding: 5px; text-align: center; border-radius: 4px; }
    button { padding: 8px 15px; background: #00ffd5; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
    button:hover { background: #00cca3; }
    .team-label { width: 120px; font-weight: bold; font-size: 0.9em; }
    .reset-btn { background: #ff4444; color: white; margin-bottom: 20px; }
</style>
</head>
<body>

<h1>Me On Game: Round Robin</h1>

<h2>League Standings</h2>
<table>
    <thead>
        <tr>
            <th>Pos</th>
            <th>Team</th>
            <th>P</th>
            <th>W</th>
            <th>D</th>
            <th>L</th>
            <th>GF</th>
            <th>GA</th>
            <th>GD</th>
            <th>Pts</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<button class="reset-btn" onclick="resetTournament()">Reset Round Robin</button>

<h2>Fixtures (45 Total Matches)</h2>
<div id="fixtures"></div>

<script>
const teamNames = ["Happi yoo", "Wilson", "Gun", "Panic Bruce", "Rhamim", "Edrine", "Elvis", "J Collins", "Cyber R", "Adamz"];
let teams = [];
let fixtures = [];

function init() {
    teams = teamNames.map(name => ({ name, played:0, won:0, draw:0, lost:0, gf:0, ga:0, gd:0, points:0 }));
    const saved = localStorage.getItem('rr_tournament');
    if (saved) {
        fixtures = JSON.parse(saved);
    } else {
        fixtures = [];
        // Round Robin Generation: i vs j
        for (let i = 0; i < teamNames.length; i++) {
            for (let j = i + 1; j < teamNames.length; j++) {
                fixtures.push({ t1: teamNames[i], t2: teamNames[j], s1: "", s2: "" });
            }
        }
    }
    renderFixtures();
    updateTable();
}

function renderFixtures() {
    const container = document.getElementById("fixtures");
    container.innerHTML = fixtures.map((f, i) => `
        <div class="match-card">
            <span class="team-label" style="text-align:right;">${f.t1}</span>
            <input type="number" id="in1${i}" value="${f.s1}" placeholder="0">
            <span>vs</span>
            <input type="number" id="in2${i}" value="${f.s2}" placeholder="0">
            <span class="team-label" style="text-align:left;">${f.t2}</span>
            <button onclick="saveMatch(${i})">Save</button>
        </div>
    `).join('');
}

function saveMatch(index) {
    const s1 = document.getElementById(`in1${index}`).value;
    const s2 = document.getElementById(`in2${index}`).value;
    
    if (s1 === "" || s2 === "") return alert("Enter both scores");
    
    fixtures[index].s1 = parseInt(s1);
    fixtures[index].s2 = parseInt(s2);
    
    localStorage.setItem('rr_tournament', JSON.stringify(fixtures));
    updateTable();
}

function updateTable() {
    // Reset all stats
    teams.forEach(t => { t.played=0; t.won=0; t.draw=0; t.lost=0; t.gf=0; t.ga=0; t.gd=0; t.points=0; });

    // Process all 45 fixtures
    fixtures.forEach(f => {
        if (f.s1 !== "" && f.s2 !== "") {
            const teamA = teams.find(t => t.name === f.t1);
            const teamB = teams.find(t => t.name === f.t2);

            teamA.played++; teamB.played++;
            teamA.gf += f.s1; teamA.ga += f.s2;
            teamB.gf += f.s2; teamB.ga += f.s1;

            if (f.s1 > f.s2) { teamA.won++; teamB.lost++; teamA.points += 3; }
            else if (f.s2 > f.s1) { teamB.won++; teamA.lost++; teamB.points += 3; }
            else { teamA.draw++; teamB.draw++; teamA.points += 1; teamB.points += 1; }
        }
    });

    teams.forEach(t => t.gd = t.gf - t.ga);
    // Sort logic
    teams.sort((a,b) => b.points - a.points || b.gd - a.gd || b.gf - a.gf);

    document.getElementById("tableBody").innerHTML = teams.map((t, i) => `
        <tr>
            <td>${i+1}</td>
            <td style="text-align:left; font-weight:bold;">${t.name}</td>
            <td>${t.played}</td>
            <td>${t.won}</td>
            <td>${t.draw}</td>
            <td>${t.lost}</td>
            <td>${t.gf}</td>
            <td>${t.ga}</td>
            <td>${t.gd}</td>
            <td style="color:#00ffd5; font-weight:bold;">${t.points}</td>
        </tr>
    `).join('');
}

function resetTournament() {
    if(confirm("Delete all scores and restart the Round Robin?")) {
        localStorage.removeItem('rr_tournament');
        init();
    }
}

init();
</script>
</body>
</html>
